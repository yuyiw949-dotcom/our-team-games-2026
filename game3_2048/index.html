<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
        }

        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
            min-width: 100px;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-info {
            color: #776e65;
            font-size: 16px;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-game-btn:hover {
            background: #776e65;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            aspect-ratio: 1;
        }

        .cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
        }

        .cell-2 { background: #eee4da; color: #776e65; }
        .cell-4 { background: #ede0c8; color: #776e65; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
        .cell-32 { background: #f67c5f; color: #f9f6f2; }
        .cell-64 { background: #f65e3b; color: #f9f6f2; }
        .cell-128 { background: #edcf72; color: #f9f6f2; font-size: 28px; }
        .cell-256 { background: #edcc61; color: #f9f6f2; font-size: 28px; }
        .cell-512 { background: #edc850; color: #f9f6f2; font-size: 28px; }
        .cell-1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
        .cell-2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
        .cell-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }

        .cell.new {
            animation: appear 0.2s ease;
        }

        .cell.merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-text {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-over-btn:hover {
            background: #776e65;
            transform: translateY(-2px);
        }

        .instructions {
            margin-top: 20px;
            color: #776e65;
            font-size: 14px;
            text-align: center;
        }

        .board-container {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-box">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="game-info">合并相同的数字！</div>
            <button class="new-game-btn" onclick="initGame()">新游戏</button>
        </div>

        <div class="board-container">
            <div class="game-board" id="board"></div>
            <div class="game-over" id="gameOver">
                <div class="game-over-text">游戏结束</div>
                <button class="game-over-btn" onclick="initGame()">重新开始</button>
            </div>
        </div>

        <div class="instructions">
            使用方向键或滑动来移动方块
        </div>
    </div>

    <script>
        let board = [];
        let score = 0;
        let gameOver = false;

        function initGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').classList.remove('show');
            addNewTile();
            addNewTile();
            renderBoard();
        }

        function addNewTile() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        emptyCells.push({row: i, col: j});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.row][randomCell.col] = Math.random() < 0.9 ? 2 : 4;
                return randomCell;
            }
            return null;
        }

        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const value = board[i][j];
                    if (value > 0) {
                        cell.textContent = value;
                        cell.classList.add(value <= 2048 ? `cell-${value}` : 'cell-super');
                    }
                    boardElement.appendChild(cell);
                }
            }
        }

        function move(direction) {
            if (gameOver) return;

            let moved = false;
            const scoreElement = document.getElementById('score');

            const rotateBoard = (times) => {
                for (let t = 0; t < times; t++) {
                    const newBoard = Array(4).fill().map(() => Array(4).fill(0));
                    for (let i = 0; i < 4; i++) {
                        for (let j = 0; j < 4; j++) {
                            newBoard[j][3 - i] = board[i][j];
                        }
                    }
                    board = newBoard;
                }
            };

            const processLine = (line) => {
                let newLine = line.filter(val => val !== 0);
                for (let i = 0; i < newLine.length - 1; i++) {
                    if (newLine[i] === newLine[i + 1]) {
                        newLine[i] *= 2;
                        score += newLine[i];
                        newLine.splice(i + 1, 1);
                    }
                }
                while (newLine.length < 4) {
                    newLine.push(0);
                }
                return newLine;
            };

            const rotations = {
                'left': 0,
                'up': 1,
                'right': 2,
                'down': 3
            };

            const reverseRotations = {
                'left': 0,
                'up': 3,
                'right': 2,
                'down': 1
            };

            rotateBoard(rotations[direction]);

            for (let i = 0; i < 4; i++) {
                const oldLine = [...board[i]];
                board[i] = processLine(board[i]);
                if (oldLine.join(',') !== board[i].join(',')) {
                    moved = true;
                }
            }

            rotateBoard(reverseRotations[direction]);

            if (moved) {
                scoreElement.textContent = score;
                addNewTile();
                renderBoard();
                checkGameOver();
            }
        }

        function checkGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) return;
                }
            }

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (j < 3 && board[i][j] === board[i][j + 1]) return;
                    if (i < 3 && board[i][j] === board[i + 1][j]) return;
                }
            }

            gameOver = true;
            document.getElementById('gameOver').classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'ArrowUp': 'up',
                'ArrowDown': 'down'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                move(keyMap[e.key]);
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 30) {
                    move(diffX > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(diffY) > 30) {
                    move(diffY > 0 ? 'down' : 'up');
                }
            }
        });

        initGame();
    </script>
</body>
</html>
