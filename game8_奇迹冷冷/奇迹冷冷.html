<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>换装小游戏</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

#app {
    width: 100%;
    max-width: 1200px;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.screen {
    text-align: center;
    animation: fadeIn 0.5s ease-in;
}

.screen.hidden {
    display: none;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 性别选择界面 */
#gender-select h1 {
    font-size: 3em;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 20px;
}

#gender-select p {
    font-size: 1.5em;
    color: white;
    margin-bottom: 40px;
}

.gender-options {
    display: flex;
    gap: 60px;
    justify-content: center;
    flex-wrap: wrap;
}

.gender-btn {
    background: white;
    border: none;
    padding: 30px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.gender-btn:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

.gender-btn span {
    font-size: 1.5em;
    color: #764ba2;
    font-weight: bold;
}

/* 游戏主界面 */
.game-container {
    display: flex;
    gap: 30px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 30px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-height: 90vh;
}

.character-area {
    flex: 1;
    background: linear-gradient(135deg, #ffe6f2 0%, #e6f3ff 100%);
    border-radius: 20px;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-width: 320px;
}

#character {
    max-width: 100%;
    height: auto;
}

.clothing-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 400px;
}

.category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    background: white;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.95em;
    transition: all 0.3s ease;
    font-weight: 500;
}

.tab-btn:hover {
    background: #f5f5f5;
    border-color: #d0d0d0;
}

.tab-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: #667eea;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.items-grid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 10px;
    background: #fafafa;
    border-radius: 15px;
    min-height: 200px;
    max-height: 400px;
}

.items-grid::-webkit-scrollbar {
    width: 8px;
}

.items-grid::-webkit-scrollbar-track {
    background: #f0f0f0;
    border-radius: 4px;
}

.items-grid::-webkit-scrollbar-thumb {
    background: #c0c0c0;
    border-radius: 4px;
}

.items-grid::-webkit-scrollbar-thumb:hover {
    background: #a0a0a0;
}

.item-card {
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 15px;
    padding: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.item-card:hover {
    border-color: #667eea;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.item-card.selected {
    border-color: #764ba2;
    background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
    box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
}

.item-card svg {
    width: 60px;
    height: 60px;
}

.item-card span {
    font-size: 0.85em;
    color: #666;
    text-align: center;
}

.back-btn {
    margin-top: 20px;
    padding: 15px 30px;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
}

.back-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(240, 147, 251, 0.5);
}

/* 响应式设计 */
@media (max-width: 900px) {
    .game-container {
        flex-direction: column;
        max-height: 85vh;
        overflow-y: auto;
    }

    .character-area {
        min-width: 250px;
    }

    .clothing-area {
        min-width: 100%;
    }

    .items-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 600px) {
    #gender-select h1 {
        font-size: 2em;
    }

    #gender-select p {
        font-size: 1.2em;
    }

    .gender-options {
        gap: 20px;
    }

    .gender-btn {
        padding: 20px;
    }

    .gender-btn svg {
        width: 90px;
        height: 120px;
    }

    .items-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
    </style>
</head>

                            <g id="top"></g>
                            <!-- 裤子 -->

                            <!-- 连衣裙 -->

                            <!-- 项链 -->

            </div>
        </div>

// 选择性别
function selectGender(gender) {
    currentGender = gender;
    
    // 设置初始状态
    selectedItems = {
        hat: null,
        glasses: null,
        necklace: null,
        top: 'white-tee',
        bottom: 'jeans',
        shoes: null,
        dress: null
    };
    
    // 更新角色外观
    updateCharacterAppearance();
    
    // 切换界面
    document.getElementById('gender-select').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    
    // 显示默认分类
    showCategory('hat');
}

// 返回性别选择
function backToGenderSelect() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('gender-select').classList.remove('hidden');
    currentGender = 'female';
}

// 更新角色外观
function updateCharacterAppearance() {
    // 更新头发
    document.getElementById('hair-back').innerHTML = hairStyles[currentGender].back;
    document.getElementById('hair-front').innerHTML = hairStyles[currentGender].front;
    
    // 更新嘴巴样式
    const mouth = document.getElementById('mouth');
    if (currentGender === 'female') {
        mouth.setAttribute('d', 'M 130 105 Q 150 115 170 105');
        mouth.setAttribute('stroke', '#FF6B9D');
    } else {
        mouth.setAttribute('d', 'M 135 105 Q 150 110 165 105');
        mouth.setAttribute('stroke', '#4A4A4A');
    }
    
    // 更新所有服装
    updateAllClothing();
}

// 更新所有服装
function updateAllClothing() {
    // 更新配饰
    updateItemLayer('hat', selectedItems.hat);
    updateItemLayer('glasses', selectedItems.glasses);
    updateItemLayer('necklace', selectedItems.necklace);
    
    // 更新鞋子
    updateItemLayer('shoes', selectedItems.shoes);
    
    // 处理连衣裙逻辑
    if (selectedItems.dress && selectedItems.dress !== 'none') {
        // 有连衣裙，隐藏上衣和裤子
        updateItemLayer('dress', selectedItems.dress);
        document.getElementById('top').style.display = 'none';
        document.getElementById('bottom').style.display = 'none';
    } else {
        // 没有连衣裙，显示上衣和裤子
        document.getElementById('top').style.display = 'block';
        document.getElementById('bottom').style.display = 'block';
        document.getElementById('dress').style.display = 'none';
        
        updateItemLayer('top', selectedItems.top);
        updateItemLayer('bottom', selectedItems.bottom);
    }
}

// 更新单层服装
function updateItemLayer(layerId, itemId) {
    const layer = document.getElementById(layerId);
    if (itemId && itemId !== 'none') {
        const item = clothingItems[layerId].find(i => i.id === itemId);
        if (item) {
            layer.innerHTML = item.svg;
            layer.style.display = 'block';
        }
    } else {
        layer.innerHTML = '';
        layer.style.display = 'none';
    }
}

// 显示分类
function showCategory(category) {
    currentCategory = category;
    
    // 更新标签状态
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.category === category) {
            btn.classList.add('active');
        }
    });
    
    // 显示分类中的物品
    const itemsGrid = document.getElementById('items-grid');
    itemsGrid.innerHTML = '';
    
    const items = clothingItems[category];
    items.forEach(item => {
        const itemCard = document.createElement('div');
        itemCard.className = 'item-card';
        if (selectedItems[category] === item.id) {
            itemCard.classList.add('selected');
        }
        
        // 创建预览SVG
        let previewSvg = '';
        if (item.svg) {
            previewSvg = `<svg viewBox="0 0 300 400">${item.svg}</svg>`;
        } else {
            previewSvg = `<svg viewBox="0 0 60 60">
                <circle cx="30" cy="30" r="25" fill="#f0f0f0" stroke="#ddd" stroke-width="2"/>
                <text x="30" y="35" text-anchor="middle" fill="#999" font-size="20">×</text>
            </svg>`;
        }
        
        itemCard.innerHTML = `
            ${previewSvg}
            <span>${item.name}</span>
        `;
        
        itemCard.addEventListener('click', () => selectItem(category, item.id));
        itemsGrid.appendChild(itemCard);
    });
}

// 选择物品
function selectItem(category, itemId) {
    selectedItems[category] = itemId;
    
    // 如果选择了连衣裙，清空上衣和裤子
    if (category === 'dress' && itemId !== 'none') {
        selectedItems.top = null;
        selectedItems.bottom = null;
    }
    
    // 如果选择了上衣或裤子，清空连衣裙
    if ((category === 'top' || category === 'bottom') && itemId !== 'none') {
        selectedItems.dress = null;
    }
    
    // 更新角色外观
    updateAllClothing();
    
    // 重新显示当前分类以更新选中状态
    showCategory(category);
}

// 初始化标签点击事件
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const category = btn.dataset.category;
        showCategory(category);
    });
});

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', () => {
    // 初始状态不显示分类，等待性别选择
    document.getElementById('game-screen').classList.add('hidden');
});
